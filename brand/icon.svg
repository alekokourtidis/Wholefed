<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient — deep dark luxury -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f18"/>
      <stop offset="100%" stop-color="#0e110d"/>
    </linearGradient>
    <!-- W gradient — elevated green -->
    <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8dbb8"/>
      <stop offset="35%" stop-color="#8aab7f"/>
      <stop offset="70%" stop-color="#5a7a4e"/>
      <stop offset="100%" stop-color="#3d5a2d"/>
    </linearGradient>
    <!-- Subtle shine overlay -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Drop shadow for the W -->
    <filter id="wShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (iOS will mask this) -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle border glow -->
  <rect width="1024" height="1024" rx="224" fill="none" stroke="rgba(188,204,171,0.08)" stroke-width="2"/>

  <!-- Shine overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>

  <!-- The W — elegant serif-inspired letterform -->
  <g filter="url(#wShadow)">
    <path
      d="M 230 290
         L 330 290
         L 420 610
         L 512 380
         L 604 610
         L 694 290
         L 794 290
         L 650 734
         L 560 734
         L 512 600
         L 464 734
         L 374 734
         Z"
      fill="url(#wGrad)"
    />
  </g>

  <!-- Subtle leaf accent — small, bottom right of the W -->
  <path
    d="M 680 700 Q 720 660 740 690 Q 720 720 680 700"
    fill="#8aab7f"
    opacity="0.5"
  />
</svg>
